<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow" />
  <title>LTL 管理 - 身价管理</title>
  <link rel="stylesheet" href="src/styles/main.css" />
</head>
<body>
  <header class="site-header">
    <nav class="nav">
      <a class="brand" href="admin-matches.html"><span class="brand-mark">LTL</span><span class="brand-text">管理后台 · 身价管理</span></a>
      <button class="nav-toggle" id="navToggle" aria-label="展开导航">☰</button>
      <div class="nav-links" id="navLinks">
        <a href="admin-matches.html">赛程管理</a>
        <a href="admin-p-ledger.html">P币流水</a>
        <a href="admin-valuation.html">身价管理</a>
        <a href="admin-reward-rules.html">奖励规则</a>
        <a href="admin-announcements.html">公告管理</a>
        <a href="admin-players.html">选手管理</a>
        <a href="admin-player-deposit-ledger.html">选手存款流水</a>
        <a href="index.html">返回官网</a>
      </div>
    </nav>
  </header>
  <main class="page-shell">
    <section class="section">
      <div class="section-heading row">
        <div>
          <p class="eyebrow">ADMIN · VALUATION</p>
          <h1 class="page-title">选手身价调整</h1>
          <p class="muted">独立手动调整会立即生效，不随赛果撤回回滚。</p>
        </div>
      </div>
      <div class="panel" style="padding:1rem;">
        <div style="display:grid;grid-template-columns:2fr 1fr 2fr auto;gap:.75rem;align-items:end;">
          <label class="field"><span class="field-label">选手</span><select class="input" id="adjustPlayer"></select></label>
          <label class="field"><span class="field-label">调整后身价</span><input class="input" id="adjustAfterValue" type="number" min="0" /></label>
          <label class="field"><span class="field-label">原因</span><input class="input" id="adjustReason" /></label>
          <button class="btn primary" id="adjustBtn" type="button">提交调整</button>
        </div>
        <p class="muted" id="currentValueHint" style="margin:.75rem 0 0;"></p>
      </div>
      <div class="panel" style="padding:1rem;margin-top:1rem;">
        <div style="display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:.75rem;">
          <label class="field"><span class="field-label">队伍</span><select class="input" id="filterTeam"></select></label>
          <label class="field"><span class="field-label">选手</span><select class="input" id="filterPlayer"></select></label>
          <label class="field"><span class="field-label">来源</span><select class="input" id="filterSource"><option value="">全部</option><option value="match_result">赛果结算</option><option value="manual_adjustment">手动调整</option></select></label>
          <label class="field"><span class="field-label">状态</span><select class="input" id="filterVoided"><option value="0">未作废</option><option value="1">已作废</option><option value="">全部</option></select></label>
          <label class="field"><span class="field-label">比赛ID</span><input class="input" id="filterMatchId" type="number" /></label>
        </div>
        <div style="display:flex;gap:.5rem;margin-top:.75rem;"><button class="btn primary" id="refreshBtn" type="button">刷新列表</button></div>
      </div>
      <div class="panel" style="margin-top:1rem;overflow:auto;">
        <table class="admin-table" style="width:100%;border-collapse:collapse;">
          <thead><tr><th style="text-align:left;padding:.75rem 1rem;">时间</th><th style="text-align:left;padding:.75rem 1rem;">选手</th><th style="text-align:left;padding:.75rem 1rem;">来源</th><th style="text-align:left;padding:.75rem 1rem;">比赛/版本</th><th style="text-align:left;padding:.75rem 1rem;">变化</th><th style="text-align:left;padding:.75rem 1rem;">状态</th><th style="text-align:left;padding:.75rem 1rem;">原因</th><th style="text-align:left;padding:.75rem 1rem;">操作</th></tr></thead>
          <tbody id="valuationBody"></tbody>
        </table>
      </div>
    </section>
  </main>
  <script type="module" src="src/admin/valuation.js"></script>
  <script src="src/components/admin-nav.js"></script>
  <script type="module">
    import { setupNav } from "./src/features/navigation.js";
    setupNav();
  </script>
</body>
</html>
