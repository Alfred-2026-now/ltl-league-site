<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow" />
  <title>LTL 管理 - 规则参数调整</title>
  <link rel="stylesheet" href="src/styles/main.css" />
</head>
<body>
  <header class="site-header">
    <nav class="nav">
      <a class="brand" href="admin-matches.html"><span class="brand-mark">LTL</span><span class="brand-text">管理后台 · 规则参数调整</span></a>
      <button class="nav-toggle" id="navToggle" aria-label="展开导航">☰</button>
      <div class="nav-links" id="navLinks"></div>
    </nav>
  </header>
  <main class="page-shell">
    <section class="section">
      <div class="section-heading row">
        <div>
          <p class="eyebrow">ADMIN · RULE PARAMETERS</p>
          <h1 class="page-title">规则参数调整</h1>
          <p class="muted">集中维护比赛奖励、奢侈税、租借费、选手转赠和工资发放参数。修改只影响后续结算，已生成流水不会回算。</p>
        </div>
      </div>

      <div class="rule-param-layout">
        <div class="rule-param-main">
          <details class="rule-param-group" data-group="reward">
            <summary>
              <span>比赛奖励</span>
              <small id="rewardSummary">默认收起</small>
            </summary>
            <div class="rule-param-content">
              <div class="rule-reward-form">
                <label class="field"><span class="field-label">赛制</span>
                  <select class="input" id="ruleFormat">
                    <option value="BO1">BO1</option><option value="BO2">BO2</option><option value="BO3">BO3</option><option value="BO5">BO5</option>
                  </select>
                </label>
                <label class="field"><span class="field-label">比分模式</span><input class="input" id="ruleScore" placeholder="如 2:1" /></label>
                <label class="field"><span class="field-label">胜方奖励</span><input class="input" id="ruleWinner" type="number" /></label>
                <label class="field"><span class="field-label">败方奖励</span><input class="input" id="ruleLoser" type="number" /></label>
                <label class="field"><span class="field-label">平局双方</span><input class="input" id="ruleDraw" type="number" /></label>
                <button class="btn primary" id="addRuleBtn" type="button">添加规则</button>
              </div>
              <div class="rule-table-wrap">
                <table class="admin-table">
                  <thead><tr>
                    <th>赛制</th>
                    <th>比分</th>
                    <th>胜方奖励</th>
                    <th>败方奖励</th>
                    <th>平局双方</th>
                    <th>状态</th>
                    <th>操作</th>
                  </tr></thead>
                  <tbody id="rulesBody"></tbody>
                </table>
              </div>
            </div>
          </details>

          <div id="parameterGroups"></div>
        </div>

        <aside class="rule-history-panel">
          <div class="rule-history-head">
            <div>
              <p class="eyebrow">HISTORY</p>
              <h2>变更历史</h2>
            </div>
            <button class="btn ghost" id="refreshHistoryBtn" type="button">刷新</button>
          </div>
          <div class="rule-history-list" id="historyList"></div>
        </aside>
      </div>
    </section>
  </main>

  <script type="module" src="src/util/admin-auth.js"></script>
  <script type="module" src="src/admin/reward-rules.js"></script>
  <script src="src/components/admin-nav.js"></script>
</body>
</html>
