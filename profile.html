<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LTL联赛 - 个人中心</title>
  <link rel="stylesheet" href="src/styles/main.css" />
  <style>
    .profile-header {
      background: linear-gradient(180deg, rgba(20, 35, 76, 0.86), rgba(10, 18, 42, 0.84));
      border: 1px solid rgba(126, 200, 255, 0.28);
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.35);
      border-radius: 18px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .profile-title {
      font-size: 1.5rem;
      font-weight: 800;
      margin: 0 0 0.4rem 0;
      color: var(--text);
      text-shadow: 0 0 16px rgba(121, 231, 255, 0.22);
    }

    .profile-subtitle {
      font-size: 0.9rem;
      color: var(--muted);
      margin: 0;
    }

    .role-badge {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 800;
      background: rgba(25, 168, 255, 0.16);
      border: 1px solid rgba(25, 168, 255, 0.38);
      color: #fff;
      margin-left: 0.5rem;
    }

    .team-badge {
      display: inline-block;
      padding: 0.25rem 0.6rem;
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: 800;
      background: rgba(255, 207, 108, 0.16);
      border: 1px solid rgba(255, 207, 108, 0.38);
      color: var(--gold);
      margin-top: 0.5rem;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .info-card {
      background: linear-gradient(180deg, rgba(20, 35, 76, 0.86), rgba(10, 18, 42, 0.84));
      border: 1px solid rgba(126, 200, 255, 0.28);
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.35);
      border-radius: 16px;
      padding: 1.25rem;
    }

    .info-label {
      font-size: 0.8rem;
      color: var(--muted);
      font-weight: 600;
      margin-bottom: 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .info-value {
      font-size: 1.75rem;
      font-weight: 900;
      color: var(--text);
      line-height: 1.2;
      text-shadow: 0 0 12px rgba(121, 231, 255, 0.18);
    }

    .info-value.large {
      font-size: 2.25rem;
    }

    .info-value.accent {
      color: var(--cyan);
    }

    .section-title {
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--cyan);
      margin: 0 0 1rem 0;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid rgba(126, 200, 255, 0.28);
      text-shadow: 0 0 12px rgba(121, 231, 255, 0.22);
      letter-spacing: 0.05em;
    }

    .password-section {
      background: linear-gradient(180deg, rgba(20, 35, 76, 0.86), rgba(10, 18, 42, 0.84));
      border: 1px solid rgba(126, 200, 255, 0.28);
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.35);
      border-radius: 16px;
      margin-bottom: 1.5rem;
      overflow: hidden;
    }

    .password-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 1.25rem;
      background: rgba(25, 168, 255, 0.08);
      border-bottom: 1px solid rgba(126, 200, 255, 0.28);
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .password-header:hover {
      background: rgba(25, 168, 255, 0.12);
    }

    .password-header h3 {
      margin: 0;
      font-size: 1rem;
      font-weight: 800;
      color: var(--text);
    }

    .password-toggle-icon {
      font-size: 1rem;
      color: var(--cyan);
      transition: transform 0.25s ease;
    }

    .password-toggle-icon.expanded {
      transform: rotate(180deg);
    }

    .password-form {
      display: none;
      padding: 1.25rem;
      gap: 1rem;
    }

    .password-form.show {
      display: grid;
    }

    .form-group {
      margin-bottom: 0;
    }

    .form-label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }

    .form-input {
      width: 100%;
      padding: 0.65rem 0.85rem;
      border: 1px solid rgba(126, 200, 255, 0.28);
      border-radius: 10px;
      font-size: 0.9rem;
      transition: all 0.2s ease;
      box-sizing: border-box;
      background: rgba(5, 12, 30, 0.82);
      color: #fff;
      outline: none;
    }

    .form-input:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 0 2px rgba(121, 231, 255, 0.16);
    }

    .password-btn {
      width: 100%;
      padding: 0.7rem 1.25rem;
      background: linear-gradient(135deg, #117cff, #8b5cff);
      border: 1px solid #117cff;
      color: #fff;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 14px 32px rgba(17, 124, 255, 0.24);
    }

    .password-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      background: linear-gradient(135deg, #4a9eff, #7c4fff);
      border-color: #4a9eff;
      box-shadow: 0 8px 24px rgba(17, 124, 255, 0.3);
    }

    .password-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .password-success {
      background: rgba(92, 255, 173, 0.16);
      border: 1px solid rgba(92, 255, 173, 0.36);
      color: #5cffad;
      padding: 0.75rem 1.25rem;
      border-radius: 10px;
      margin-top: 1rem;
      display: none;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .password-success.show {
      display: block;
    }

    .exchanges-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .exchange-item {
      background: linear-gradient(180deg, rgba(20, 35, 76, 0.86), rgba(10, 18, 42, 0.84));
      border: 1px solid rgba(126, 200, 255, 0.28);
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.35);
      border-radius: 16px;
      padding: 1.25rem;
      transition: border-color 0.2s ease;
    }

    .exchange-item:hover {
      border-color: rgba(121, 231, 255, 0.5);
    }

    .exchange-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.75rem;
      gap: 0.5rem;
    }

    .exchange-prize {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
    }

    .exchange-cost {
      font-size: 1.1rem;
      font-weight: 900;
      color: var(--cyan);
      text-shadow: 0 0 10px rgba(121, 231, 255, 0.3);
    }

    .exchange-meta {
      display: flex;
      gap: 1rem;
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 0.5rem;
      flex-wrap: wrap;
    }

    .exchange-status {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 900;
      border: 1px solid rgba(255, 255, 255, 0.14);
    }

    .status-pending {
      background: rgba(255, 207, 108, 0.16);
      border-color: rgba(255, 207, 108, 0.38);
      color: var(--gold);
    }

    .status-approved {
      background: rgba(25, 168, 255, 0.16);
      border-color: rgba(25, 168, 255, 0.38);
      color: #19a8ff;
    }

    .status-completed {
      background: rgba(92, 255, 173, 0.16);
      border-color: rgba(92, 255, 173, 0.36);
      color: #5cffad;
    }

    .status-rejected {
      background: rgba(255, 112, 112, 0.16);
      border-color: rgba(255, 112, 112, 0.36);
      color: #ff7070;
    }

    .status-cancelled {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.12);
      color: var(--muted);
    }

    .exchange-actions {
      margin-top: 0.75rem;
      display: flex;
      gap: 0.5rem;
    }

    .btn-cancel {
      padding: 0.5rem 1rem;
      background: rgba(255, 112, 112, 0.16);
      border: 1px solid rgba(255, 112, 112, 0.36);
      color: #ff7070;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-cancel:hover:not(:disabled) {
      background: rgba(255, 112, 112, 0.24);
      border-color: rgba(255, 112, 112, 0.5);
    }

    .btn-cancel:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .empty-state {
      text-align: center;
      padding: 2rem 1rem;
      color: var(--muted);
    }

    .empty-icon {
      font-size: 2.5rem;
      margin-bottom: 0.75rem;
    }

    .loading {
      text-align: center;
      padding: 2rem;
      color: var(--muted);
    }

    .error-message {
      background: rgba(255, 112, 112, 0.16);
      border: 1px solid rgba(255, 112, 112, 0.36);
      color: #ff7070;
      padding: 0.75rem 1.25rem;
      border-radius: 10px;
      margin-bottom: 1rem;
      font-size: 0.9rem;
    }

    @media (max-width: 768px) {
      .profile-header {
        padding: 1.25rem 1rem;
      }

      .profile-title {
        font-size: 1.25rem;
      }

      .info-grid {
        grid-template-columns: 1fr;
      }

      .info-value {
        font-size: 1.5rem;
      }

      .info-value.large {
        font-size: 1.75rem;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <header class="site-header">
      <nav class="nav">
        <a class="brand" href="index.html"><span class="brand-mark">LTL</span><span class="brand-text">个人中心</span></a>
        <button class="nav-toggle" id="navToggle" aria-label="展开导航">☰</button>
        <div class="nav-links" id="navLinks"></div>
      </nav>
    </header>

    <main class="page-shell">
      <section class="section">
        <div class="section-heading">
          <p class="eyebrow">PROFILE</p>
          <h1 class="page-title">个人中心</h1>
        </div>

        <div id="errorContainer" style="display: none;"></div>
        <div id="loadingContainer" class="loading">加载中...</div>

        <div id="profileContent" style="display: none;">
          <div class="profile-header">
            <h2 class="profile-title">
              <span id="playerName"></span>
              <span class="role-badge" id="roleBadge"></span>
            </h2>
            <p class="profile-subtitle" id="teamInfo"></p>
          </div>

          <div class="info-grid">
            <div class="info-card">
              <div class="info-label">当前身价</div>
              <div class="info-value large accent" id="playerValue">-</div>
            </div>
            <div class="info-card">
              <div class="info-label">当前积分</div>
              <div class="info-value large accent" id="playerDeposit">-</div>
            </div>
            <div class="info-card">
              <div class="info-label">位置</div>
              <div class="info-value" id="playerPosition">-</div>
            </div>
            <div class="info-card">
              <div class="info-label">状态</div>
              <div class="info-value" id="playerStatus">-</div>
            </div>
          </div>

          <h2 class="section-title">账户设置</h2>

          <!-- 修改密码部分 -->
          <div class="password-section">
            <div class="password-header" id="passwordHeader">
              <h3>修改密码</h3>
              <span class="password-toggle-icon" id="passwordToggleIcon">▼</span>
            </div>
            <form class="password-form" id="passwordForm">
              <div class="form-group">
                <label class="form-label" for="currentPassword">当前密码</label>
                <input type="password" id="currentPassword" class="form-input" placeholder="请输入当前密码" required>
              </div>
              <div class="form-group">
                <label class="form-label" for="newPassword">新密码</label>
                <input type="password" id="newPassword" class="form-input" placeholder="请输入新密码（至少6位）" required>
              </div>
              <div class="form-group">
                <label class="form-label" for="confirmPassword">确认新密码</label>
                <input type="password" id="confirmPassword" class="form-input" placeholder="请再次输入新密码" required>
              </div>
              <button type="submit" class="password-btn" id="passwordBtn">修改密码</button>
              <div class="password-success" id="passwordSuccess">✓ 密码修改成功</div>
            </form>
          </div>

          <h2 class="section-title">积分兑换记录</h2>
          <div id="exchangesContainer" class="exchanges-list"></div>
          <div id="exchangesEmpty" class="empty-state" style="display: none;">
            <div class="empty-icon">📦</div>
            <p>暂无兑换记录</p>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script type="module">
    import { authApi, requireAuth, formatDate, formatExchangeStatus } from './src/util/auth.js';

    const loadingContainer = document.getElementById('loadingContainer');
    const profileContent = document.getElementById('profileContent');
    const errorContainer = document.getElementById('errorContainer');
    const exchangesContainer = document.getElementById('exchangesContainer');
    const exchangesEmpty = document.getElementById('exchangesEmpty');

    // 显示错误
    function showError(message) {
      errorContainer.innerHTML = `<div class="error-message">${message}</div>`;
      errorContainer.style.display = 'block';
      loadingContainer.style.display = 'none';
    }

    // 格式化位置
    function formatPosition(position) {
      const positionMap = {
        'TOP': '上单',
        'JUG': '打野',
        'MID': '中单',
        'BOT': '射手',
        'SUP': '辅助'
      };
      return positionMap[position] || position || '-';
    }

    // 撤回兑换
    async function cancelExchange(exchangeId, button) {
      const reason = prompt('请输入撤回原因（可选）：');
      if (reason === null) return;

      button.disabled = true;
      button.textContent = '撤回中...';

      try {
        await fetch('/api/prize-exchanges/' + exchangeId + '/cancel?reason=' + encodeURIComponent(reason || '用户主动撤回'), {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          }
        });

        alert('兑换已撤回，积分将返还到您的账户');
        location.reload();

      } catch (error) {
        console.error('撤回失败:', error);
        alert('撤回失败：' + error.message);
        button.disabled = false;
        button.textContent = '撤回';
      }
    }

    // 修改密码折叠功能
    const passwordHeader = document.getElementById('passwordHeader');
    const passwordToggleIcon = document.getElementById('passwordToggleIcon');
    const passwordForm = document.getElementById('passwordForm');
    const passwordSuccess = document.getElementById('passwordSuccess');

    if (passwordHeader && passwordToggleIcon && passwordForm) {
      passwordHeader.addEventListener('click', () => {
        passwordForm.classList.toggle('show');
        passwordToggleIcon.classList.toggle('expanded');
      });
    }

    // 修改密码
    document.getElementById('passwordForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const currentPassword = document.getElementById('currentPassword').value.trim();
      const newPassword = document.getElementById('newPassword').value.trim();
      const confirmPassword = document.getElementById('confirmPassword').value.trim();
      const passwordBtn = document.getElementById('passwordBtn');

      if (!currentPassword || !newPassword || !confirmPassword) {
        alert('请填写所有密码字段');
        return;
      }

      if (newPassword !== confirmPassword) {
        alert('新密码和确认密码不一致');
        return;
      }

      if (newPassword.length < 6) {
        alert('新密码长度不能少于6位');
        return;
      }

      passwordBtn.disabled = true;
      passwordBtn.textContent = '修改中...';

      try {
        await authApi.changePassword(currentPassword, newPassword, confirmPassword);
        passwordSuccess.classList.add('show');
        document.getElementById('passwordForm').reset();
        passwordForm.classList.remove('show');

        setTimeout(() => {
          passwordSuccess.classList.remove('show');
        }, 3000);

      } catch (error) {
        alert('修改密码失败：' + error.message);
      } finally {
        passwordBtn.disabled = false;
        passwordBtn.textContent = '修改密码';
      }
    });

    // 加载个人中心数据
    async function loadProfile() {
      try {
        const userInfo = await authApi.getUserInfo();
        if (!userInfo) {
          showError('无法获取用户信息，请重新登录');
          return;
        }

        // 填充用户信息
        document.getElementById('playerName').textContent = userInfo.playerName;
        const roleBadge = document.getElementById('roleBadge');
        roleBadge.textContent = userInfo.roleName;

        // 队伍信息
        const teamInfo = document.getElementById('teamInfo');
        if (userInfo.teamName) {
          teamInfo.innerHTML = `<span class="team-badge">${userInfo.teamState} - ${userInfo.teamName}</span>`;
        } else {
          teamInfo.textContent = '自由人';
        }

        // 玩家数据
        document.getElementById('playerValue').textContent = (userInfo.value || 0) + ' P';
        document.getElementById('playerDeposit').textContent = (userInfo.deposit || 0) + ' 积分';
        document.getElementById('playerPosition').textContent = formatPosition(userInfo.position);

        // 状态
        const statusText = userInfo.isSubstitute === 1 ? '替补' : '主力';
        document.getElementById('playerStatus').textContent = statusText;

        // 加载兑换记录
        const exchanges = await authApi.getUserPrizeExchanges();
        if (exchanges.length === 0) {
          exchangesEmpty.style.display = 'block';
          exchangesContainer.style.display = 'none';
        } else {
          exchangesEmpty.style.display = 'none';
          exchangesContainer.style.display = 'flex';

          exchanges.forEach(exchange => {
            const item = document.createElement('div');
            item.className = 'exchange-item';

            const canCancel = exchange.status === 'pending';
            const actionsHtml = canCancel ? `
              <div class="exchange-actions">
                <button class="btn-cancel" onclick="cancelExchange(${exchange.id}, this)">撤回</button>
              </div>
            ` : '';

            item.innerHTML = `
              <div class="exchange-header">
                <div class="exchange-prize">兑换记录 #${exchange.id}</div>
                <div class="exchange-cost">-${exchange.costPoints} 积分</div>
              </div>
              <div class="exchange-meta">
                <span>奖品：${exchange.prizeName || '奖品 #' + exchange.prizeId}</span>
                <span>兑换时间：${formatDate(exchange.createdAt)}</span>
              </div>
              <div class="exchange-meta">
                <span>状态：<span class="exchange-status status-${exchange.status}">${exchange.statusText || formatExchangeStatus(exchange.status)}</span></span>
              </div>
              ${exchange.contactInfo ? `<div class="exchange-meta">联系方式：${exchange.contactInfo}</div>` : ''}
              ${exchange.remark ? `<div class="exchange-meta">备注：${exchange.remark}</div>` : ''}
              ${exchange.processedAt ? `<div class="exchange-meta">处理时间：${formatDate(exchange.processedAt)}</div>` : ''}
              ${actionsHtml}
            `;

            exchangesContainer.appendChild(item);
          });
        }

        // 显示内容
        loadingContainer.style.display = 'none';
        profileContent.style.display = 'block';

      } catch (error) {
        console.error('加载失败:', error);
        showError('加载数据失败：' + error.message);
      }
    }

    // 检查登录状态并加载个人中心
    async function checkAuthAndLoad() {
      try {
        const user = await requireAuth();
        if (user) {
          await loadProfile();
        }
      } catch (error) {
        console.error('认证或加载失败:', error);
        showError('认证失败，请重新登录');
      }
    }

    checkAuthAndLoad();

    // 暴露撤回函数到全局作用域
    window.cancelExchange = cancelExchange;
  </script>
  <script src="src/components/public-nav.js"></script>
</body>
</html>
