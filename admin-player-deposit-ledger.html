<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow" />
  <title>LTL 管理 - 选手积分流水</title>
  <link rel="stylesheet" href="src/styles/main.css" />
</head>
<body>
  <header class="site-header">
    <nav class="nav">
      <a class="brand" href="admin-matches.html"><span class="brand-mark">LTL</span><span class="brand-text">管理后台 · 选手积分流水</span></a>
      <button class="nav-toggle" id="navToggle" aria-label="展开导航">☰</button>
      <div class="nav-links" id="navLinks"></div>
    </nav>
  </header>

  <main class="page-shell">
    <section class="section">
      <div class="section-heading row">
        <div>
          <p class="eyebrow">ADMIN · PLAYER DEPOSIT</p>
          <h1 class="page-title">选手积分流水</h1>
          <p class="muted">查询和管理选手P币积分变动流水。</p>
        </div>
      </div>

      <div class="panel" style="padding:1rem;">
        <div style="display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:.75rem;">
          <label class="field"><span class="field-label">选手</span><select class="input" id="filterPlayer"></select></label>
          <label class="field"><span class="field-label">队伍</span><select class="input" id="filterTeam"></select></label>
          <label class="field"><span class="field-label">类型</span><select class="input" id="filterType"><option value="">全部</option><option value="loan_fee">租借费</option><option value="manual_adjustment">手动调整</option><option value="race_reward">比赛奖励</option><option value="transfer_out">转赠扣款</option><option value="transfer_in">转赠收款</option></select></label>
          <label class="field"><span class="field-label">状态</span><select class="input" id="filterVoided"><option value="0">未作废</option><option value="1">已作废</option><option value="">全部</option></select></label>
          <label class="field"></label>
        </div>
        <div style="display:flex;gap:.5rem;margin-top:.75rem;"><button class="btn primary" id="refreshBtn" type="button">刷新</button></div>
      </div>

      <div class="panel" style="padding:1rem;margin-top:1rem;">
        <h3 style="margin:0 0 1rem 0;">调整选手积分</h3>
        <div style="display:grid;grid-template-columns:2fr 1fr 2fr auto;gap:.75rem;align-items:end;">
          <label class="field"><span class="field-label">选手</span><select class="input" id="adjustPlayer"></select></label>
          <label class="field"><span class="field-label">调整金额</span><input class="input" id="adjustAmount" type="number" placeholder="正数增加/负数减少" /></label>
          <label class="field"><span class="field-label">原因</span><input class="input" id="adjustReason" placeholder="调整原因" /></label>
          <button class="btn primary" id="adjustBtn" type="button">提交</button>
        </div>
        <p class="muted" id="currentDepositHint" style="margin:.75rem 0 0;"></p>
      </div>

      <div class="panel" style="padding:1rem;margin-top:1rem;">
        <h3 style="margin:0 0 1rem 0;">一键发工资</h3>
        <div style="display:grid;grid-template-columns:1fr 1fr auto auto;gap:.75rem;align-items:end;">
          <label class="field">
            <span class="field-label">工资比例(%)</span>
            <input class="input" id="salaryRate" type="number" value="10" min="1" max="100" placeholder="如:10表示10%" />
          </label>
          <label class="field">
            <span class="field-label">预计影响</span>
            <input class="input" id="salaryPreview" type="text" readonly placeholder="将显示影响的选手数量" />
          </label>
          <button class="btn primary" id="salaryBtn" type="button">一键发工资</button>
          <button class="btn" id="voidSalaryBtn" type="button" style="background:#ff6b6b;color:white;">撤回最近工资</button>
        </div>
        <p class="muted" style="margin:.75rem 0 0;">说明：给所有在职选手（status=1且在队伍中）发放工资，金额 = 身价 × 比例%。撤回将作废最近一次发放的所有工资流水。</p>
      </div>

      <div class="panel" style="margin-top:1rem;overflow:auto;">
        <table class="admin-table" style="width:100%;border-collapse:collapse;">
          <thead>
            <tr>
              <th style="text-align:left;padding:.75rem 1rem;">时间</th>
              <th style="text-align:left;padding:.75rem 1rem;">选手</th>
              <th style="text-align:left;padding:.75rem 1rem;">队伍</th>
              <th style="text-align:left;padding:.75rem 1rem;">类型</th>
              <th style="text-align:left;padding:.75rem 1rem;">金额</th>
              <th style="text-align:left;padding:.75rem 1rem;">余额变化</th>
              <th style="text-align:left;padding:.75rem 1rem;">状态</th>
              <th style="text-align:left;padding:.75rem 1rem;">原因</th>
              <th style="text-align:left;padding:.75rem 1rem;">操作</th>
            </tr>
          </thead>
          <tbody id="ledgerBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <!-- 管理员权限验证 -->
  <script type="module" src="src/util/admin-auth.js"></script>
  <script type="module" src="src/admin/player-deposit-ledger.js"></script>
  <script src="src/components/admin-nav.js"></script>
  
</body>
</html>
