<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>选手排行榜 - LTL联赛</title>
  <link rel="stylesheet" href="src/styles/main.css" />
</head>
<body>
  <header class="site-header">
    <nav class="nav">
      <a class="brand" href="index.html"><span class="brand-mark">LTL</span><span class="brand-text">联赛规则中心</span></a>
      <button class="nav-toggle" id="navToggle" aria-label="展开导航">☰</button>
      <div class="nav-links" id="navLinks">
        <a href="announcements.html">公告</a>
        <a href="standings.html">积分榜</a>
        <a href="teams.html">队伍</a>
        <a href="player-rankings.html">选手榜</a>
        <a href="rules.html">规则</a>
        <a href="tools.html">计算器</a>
        <a href="schedule.html">赛程</a>
        <a href="match-history.html">战绩</a>
      </div>
    </nav>
  </header>

  <main class="container">
    <section class="section">
      <div class="section-heading">
        <p class="eyebrow">PLAYER RANKINGS</p>
        <h1 class="page-title">选手排行榜</h1>
        <p class="muted">选手身价与积分排行榜</p>
      </div>

      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1rem;margin-bottom:1rem;">
        <button class="btn primary" id="showValueRankings">身价排行</button>
        <button class="btn" id="showDepositRankings">积分排行</button>
        <button class="btn" id="showReviewRankings">选手评价</button>
      </div>

      <div class="panel" style="background:linear-gradient(135deg, rgba(20, 30, 60, 0.9), rgba(30, 40, 80, 0.9));border:1px solid rgba(121, 231, 255, 0.2);">
        <div class="ranking-panel-heading">
          <h2 id="rankingTitle" style="color:#7cffb2;">选手身价排行榜</h2>
          <div class="review-sort-controls" id="reviewSortControls" style="display:none;">
            <button class="btn primary" type="button" data-review-sort="reviewCount">按点评数量</button>
            <button class="btn" type="button" data-review-sort="popularity">按总人气</button>
          </div>
        </div>
        <table class="admin-table ranking-table" style="width:100%;border-collapse:collapse;background:rgba(10, 15, 35, 0.6);border-radius:12px;overflow:hidden;">
          <thead><tr style="background:linear-gradient(90deg, rgba(25, 168, 255, 0.15), rgba(140, 92, 255, 0.15));border-bottom:2px solid rgba(121, 231, 255, 0.3);"><th style="text-align:left;padding:.75rem 1rem;color:#79e7ff;font-weight:600;">排名</th><th style="text-align:left;padding:.75rem 1rem;color:#79e7ff;font-weight:600;">选手</th><th style="text-align:left;padding:.75rem 1rem;color:#79e7ff;font-weight:600;">队伍</th><th style="text-align:left;padding:.75rem 1rem;color:#79e7ff;font-weight:600;" id="valueHeader">身价(P)</th><th style="text-align:left;padding:.75rem 1rem;color:#79e7ff;font-weight:600;" id="depositHeader">积分(P)</th><th style="text-align:left;padding:.75rem 1rem;color:#79e7ff;font-weight:600;display:none;" id="reviewExtraHeader">总人气</th></tr></thead>
          <tbody id="rankingBody"></tbody>
        </table>
        <div class="ranking-cards" id="rankingCards"></div>
      </div>

      <div id="reviewDetail" class="review-detail"></div>
    </section>
  </main>

  <footer class="footer"><p>LTL联赛规则中心</p></footer>
  <script type="module" src="src/main.js"></script>
  <script src="src/components/public-nav.js"></script>
  <script type="module" src="src/player-rankings.js"></script>
</body>
</html>
