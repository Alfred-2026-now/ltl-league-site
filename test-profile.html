<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>个人中心测试</title>
</head>
<body>
  <h1>个人中心测试页面</h1>
  <div id="status">正在测试...</div>
  <script>
    async function testAPI() {
      const status = document.getElementById('status');

      try {
        status.innerHTML = '1. 测试获取当前用户...';

        const response = await fetch('http://123.57.19.160:8080/api/auth/current', {
          credentials: 'include'
        });

        const data = await response.json();
        status.innerHTML = '2. API响应: ' + JSON.stringify(data, null, 2);

        if (data.code === 200 && data.data) {
          status.innerHTML += '<br>✅ 用户信息获取成功！<br>';
          status.innerHTML += '用户名: ' + data.data.playerName + '<br>';
          status.innerHTML += '角色: ' + data.data.roleName + '<br>';

          // 测试用户信息API
          status.innerHTML += '3. 测试用户信息API...';

          const userInfoResponse = await fetch('http://123.57.19.160:8080/api/user/info', {
            credentials: 'include'
          });

          const userData = await userInfoResponse.json();
          status.innerHTML += '<br>✅ 用户信息API: ' + JSON.stringify(userData, null, 2);

          if (userData.code === 200) {
            status.innerHTML += '<br><br><strong>测试成功！</strong><br>';
            status.innerHTML += '可以正常访问个人中心';
          } else {
            status.innerHTML += '<br><br>❌ 用户信息API失败: ' + userData.message;
          }
        } else {
          status.innerHTML += '<br>❌ 未登录: ' + data.message;
        }

      } catch (error) {
        status.innerHTML = '❌ 错误: ' + error.message;
        console.error('详细错误:', error);
      }
    }

    testAPI();
  </script>
</body>
</html>
